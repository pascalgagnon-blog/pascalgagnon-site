[build]
  command   = "python3 build.py"
  publish   = "dist"

[build.environment]
  PYTHON_VERSION = "3.10"

[[redirects]]
  from = "/articles"
  to   = "/articles/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
